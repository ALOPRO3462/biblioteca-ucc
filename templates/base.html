<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca UCC</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                Biblioteca UCC
            </a>
            <div>
                <a class="btn btn-outline-light me-2" href="/">
                    Libros
                </a>
                <a class="btn btn-outline-light me-2" href="/estudiantes">
                    Estudiantes
                </a>
                <a class="btn btn-outline-light" href="/prestamos">
                    Prestamos
                </a>
                <a class="btn btn-warning ms-2" href="/reporte">
                    <i class="bi bi-file-earmark-pdf"></i>
                    Reporte
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <div class="container mt-4">
        {% block contenido %}
        {% endblock %}
    </div>
</body>

</html>
