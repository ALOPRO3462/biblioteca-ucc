{% extends 'base.html' %}

{% block contenido %}

<h1 class="mb-4">
    Editar Libro
</h1>

<form method="POST" class="card p-4">

    <div class="mb-3">

        <label class="form-label">
            Titulo
        </label>

        <input
            type="text"
            name="titulo"
            value="{{ libro.titulo }}"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label class="form-label">
            Autor
        </label>

        <input
            type="text"
            name="autor"
            value="{{ libro.autor }}"
            class="form-control"
            required
        >

    </div>

    <div class="mb-3">

        <label class="form-label">
            Stock
        </label>

        <input
            type="number"
            name="stock"
            value="{{ libro.stock }}"
            class="form-control"
            required
        >

    </div>

    <button
        type="submit"
        class="btn btn-primary"
    >
        Actualizar
    </button>

</form>

{% endblock %}
